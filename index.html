<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golfbanenvinder</title>
  <style>html,body{margin:0;padding:0;background:#faf8f3;font-family:Arial,sans-serif;}</style>
</head>
<body>
<div id="golfbanen-widget">
<style>
  #golfbanen-widget {
    font-family: Arial, sans-serif;
    font-size: 18px;
    box-sizing: border-box;
    background: #faf8f3;
    min-height: 100%;
    color: #1a2e1e;
    position: relative;
    width: 100%;
  }
  #golfbanen-widget *, #golfbanen-widget *::before, #golfbanen-widget *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  #golfbanen-widget .gb-header {
    background: #F2F2F2;
    color: #1a2e1e;
    padding: 28px 20px 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  #golfbanen-widget .gb-header-inner {
    max-width: 1100px;
    margin: 0 auto;
  }
  #golfbanen-widget .gb-header h1 {
    font-family: Arial, sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    color: #1a2e1e;
  }
  #golfbanen-widget .gb-subtitle {
    font-size: 0.95rem;
    opacity: 0.5;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  #golfbanen-widget .gb-search-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  #golfbanen-widget .gb-search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
  }
  #golfbanen-widget .gb-search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.35;
    pointer-events: none;
  }
  #golfbanen-widget input[type=text].gb-input,
  #golfbanen-widget select.gb-select {
    width: 100%;
    padding: 10px 12px 10px 36px;
    border-radius: 8px;
    border: 1.5px solid rgba(0,0,0,0.18);
    background: white;
    color: #1a2e1e;
    font-family: Arial, sans-serif;
    font-size: 1.3rem;
    transition: border 0.2s;
  }
  #golfbanen-widget select.gb-select {
    padding-left: 12px;
    appearance: none;
    cursor: pointer;
    flex: 0 0 auto;
    width: auto;
    min-width: 130px;
  }
  #golfbanen-widget input[type=text].gb-input::placeholder { color: rgba(0,0,0,0.35); }
  #golfbanen-widget input[type=text].gb-input:focus,
  #golfbanen-widget select.gb-select:focus {
    border-color: #4a8c5c;
    background: white;
  }
  #golfbanen-widget .gb-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  #golfbanen-widget .gb-chips + .gb-chips { margin-top: 6px; }
  #golfbanen-widget .gb-chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 1.3rem;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid rgba(0,0,0,0.2);
    background: transparent;
    color: #4a5e50;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    font-family: Arial, sans-serif;
  }
  #golfbanen-widget .gb-chip.active {
    background: #062F3D;
    border-color: #062F3D;
    color: #FFFFFF;
  }
  #golfbanen-widget .gb-chip.gb-chip-type:not(.active) {
    background: #FFFFFF;
  }
  #golfbanen-widget .gb-chip:hover:not(.active) {
    border-color: #2d5a3d;
    color: #1a3a2a;
  }
  #golfbanen-widget .gb-results-bar {
    max-width: 1100px;
    margin: 0 auto;
    padding: 12px 20px 4px;
    font-size: 0.95rem;
    color: #7a9480;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  #golfbanen-widget .gb-sort-row {
    max-width: 1100px;
    margin: 0 auto;
    padding: 4px 16px 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  #golfbanen-widget .gb-sort-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 1rem;
    font-weight: 500;
    font-family: Arial, sans-serif;
    cursor: pointer;
    border: 1.5px solid rgba(0,0,0,0.2);
    background: #FFFFFF;
    color: #4a5e50;
    transition: all 0.2s;
  }
  #golfbanen-widget .gb-sort-btn.active {
    background: #062F3D;
    border-color: #062F3D;
    color: #FFFFFF;
  }
  #golfbanen-widget .gb-sort-btn:hover:not(.active) {
    border-color: #062F3D;
    color: #062F3D;
  }
  #golfbanen-widget .gb-cards {
    max-width: 1100px;
    margin: 0 auto;
    padding: 4px 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #golfbanen-widget .gb-card {
    background: white;
    border-radius: 14px;
    padding: 18px 22px;
    box-shadow: 0 4px 20px rgba(26,58,42,0.12);
    border: 1px solid rgba(106,171,127,0.12);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  #golfbanen-widget .gb-card:hover {
    box-shadow: 0 8px 32px rgba(26,58,42,0.22);
    transform: translateY(-1px);
  }

  /* === Rij 1: naam + type links, provincie + Q rechts === */
  #golfbanen-widget .gb-row1 {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  #golfbanen-widget .gb-row1-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  #golfbanen-widget .gb-card-title {
    font-family: Arial, sans-serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: #1a3a2a;
    line-height: 1.2;
  }
  #golfbanen-widget .gb-card-subtitle {
    font-size: 1.2rem;
    color: #7a9480;
    font-style: italic;
    margin-top: 3px;
    margin-left: 4px;
  }
  #golfbanen-widget .gb-row1-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
  }

  /* === Badges === */
  #golfbanen-widget .gb-badge {
    display: inline-block;
    padding: 4px 11px;
    border-radius: 6px;
    font-size: 1.1rem;
  }
  #golfbanen-widget .gb-badge-type {
    background: #062F3D;
    color: #FFFFFF;
    border: 1px solid rgba(126,168,202,0.3);
  }
  #golfbanen-widget .gb-badge-q {
    background: #062F3D;
    color: #FFFFFF;
    border: 1px solid rgba(126,168,202,0.3);
  }
  #golfbanen-widget .gb-badge-nq {
    background: #062F3D;
    color: #FFFFFF;
    border: 1px solid rgba(126,168,202,0.3);
  }
  #golfbanen-widget .gb-badge-dist {
    background: #CFF0F7;
    color: #1a3a5a;
    border: 1px solid rgba(126,168,202,0.3);
    margin-left: 10px;
    font-size: 1rem;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    vertical-align: middle;
  }
  #golfbanen-widget .gb-badge-dist .gb-dist-icon {
    color: #ED4040;
  }
  #golfbanen-widget .gb-badge-prov {
    background: #f0ece4;
    color: #7a6540;
    border: 1px solid rgba(122,101,64,0.2);
  }

  /* === Scheidingslijn === */
  #golfbanen-widget .gb-divider {
    border: none;
    border-top: 1px solid rgba(106,171,127,0.15);
    margin: 10px 0;
  }

  /* === Rij 2: 4 stats === */
  #golfbanen-widget .gb-stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  @media (max-width: 480px) {
    #golfbanen-widget .gb-stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
  #golfbanen-widget .gb-stat {
    background: #faf8f3;
    border-radius: 8px;
    padding: 8px 12px;
    border: 1px solid rgba(106,171,127,0.12);
  }
  #golfbanen-widget .gb-stat-label {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #7a9480;
    font-weight: 600;
    margin-bottom: 3px;
  }
  #golfbanen-widget .gb-stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1a3a2a;
  }
  #golfbanen-widget .gb-stat-value.gb-stat-eis {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.3;
  }

  #golfbanen-widget .gb-card-footer {
    margin-top: 12px;
    display: flex;
    align-items: center;
  }
  #golfbanen-widget .gb-btn-website {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    font-family: Arial, sans-serif;
    text-decoration: none;
    background: #062F3D;
    color: #FFFFFF;
    border: none;
    transition: background 0.2s;
    cursor: pointer;
  }
  #golfbanen-widget .gb-btn-website:hover {
    background: #041f29;
    color: #FFFFFF;
    text-decoration: none;
  }
  #golfbanen-widget .gb-btn-reset {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 1.3rem;
    font-weight: 500;
    font-family: Arial, sans-serif;
    cursor: pointer;
    border: 1.5px solid rgba(0,0,0,0.2);
    background: #FFFFFF;
    color: #2A7A3A;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  #golfbanen-widget .gb-btn-reset:hover {
    border-color: #062F3D;
    color: #062F3D;
  }
  #golfbanen-widget .gb-badge-hightech {
    background: #062F3D;
    color: #FFFFFF;
    border: 1px solid rgba(126,168,202,0.3);
    padding: 9px 18px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    font-size: 1.1rem;
    font-family: Arial, sans-serif;
  }
  #golfbanen-widget .gb-badge-indoor {
    background: #062F3D;
    color: #FFFFFF;
    border: 1px solid rgba(126,168,202,0.3);
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 1.1rem;
    font-family: Arial, sans-serif;
    display: inline-flex;
    align-items: center;
  }
  #golfbanen-widget .gb-badge-verlicht {
    background: #062F3D;
    color: #ffffff;
    border: 1px solid rgba(126,168,202,0.3);
    font-size: 1.1rem;
    font-family: Arial, sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  #golfbanen-widget .gb-card-hightech {
    background: white;
    border-radius: 14px;
    padding: 22px 24px;
    box-shadow: 0 4px 20px rgba(26,58,42,0.12);
    border: 1px solid rgba(106,171,127,0.12);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  #golfbanen-widget .gb-card-hightech:hover {
    box-shadow: 0 8px 32px rgba(26,58,42,0.22);
    transform: translateY(-1px);
  }
  #golfbanen-widget .gb-no-results {
    text-align: center;
    padding: 60px 20px;
    color: #7a9480;
  }
  #golfbanen-widget .gb-no-results svg {
    margin-bottom: 12px;
    opacity: 0.35;
  }
</style>

      <button id="gb-chip-indoor" class="gb-chip" data-type="indoor">Indoor</button>
      <button id="gb-chip-verlicht" class="gb-chip" data-type="verlicht">Banen met verlichting</button>
      <button class="gb-chip" data-eis="Geen eis">Waar mag ik spelen zonder NGF-Golfbaanpermissie of handicap?</button>
      <button class="gb-chip" data-eis="NGF-Golfbaanpermissie">Waar mag ik spelen met NGF-Golfbaanpermissie?</button>
      
      
      
      
      
    </div>
  </div>
</div>
<div class="gb-results-bar" id="gb-count"></div>
<div class="gb-sort-row">
  <button id="gb-sort-naam" class="gb-sort-btn active">A-Z</button>

  <button id="gb-sort-asc" class="gb-sort-btn">Sorteer op speeleisen &#11014;</button>

  <button id="gb-sort-lengte-desc" class="gb-sort-btn">Sorteer op lengte &#11014;</button>
</div>
<div class="gb-cards" id="gb-cards"></div>
</div>

  function typeLabel(t) {
    var map = {
      'grote baan': 'Grote baan', 'par 3': 'Par 3', 'par 3/4': 'Par 3/4',
      'shortgolf/pitch&putt': 'Shortgolf / P&P', 'oefenholes': 'Oefenholes'
    };
    return map[t] || t;
  }

  function haversine(lat1, lng1, lat2, lng2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLng = (lng2 - lng1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 1.3;
  }

  var NGF_VARS = ['NGF-Golfbaanpermissie','NGF-golfbaanpermissie','NGF-Baanpermissie','NGF-baanpermissie'];
  var EIS_ORDER = {'Handicap 24':0,'Handicap 28':1,'Handicap 36':2,'Handicap 45':3,'Handicap 54':4,'NGF-Golfbaanpermissie':5,'NGF-golfbaanpermissie':5,'NGF-Baanpermissie':5,'NGF-baanpermissie':5,'Geen eis':6};

  function eisRank(eis) {
    return EIS_ORDER[eis] !== undefined ? EIS_ORDER[eis] : 99;

  function lusMatchEis(lus) {
    if (!activeEis) return true;
    var e = lus.speeleisen;

    if (activeEis === 'Geen eis')              return e === 'Geen eis';

  function filterLocaties() {

    return LOCATIES.filter(function(loc) {
      var matchSearch = !q || isPostcode ||

      if (activeVerlicht) return loc.verlicht;

        return loc.lussen.some(function(l) { return !l.indoor_only && (l.type === activeType || l.type.trim() === activeType); });
      }

      if (activeEis) {
        return loc.lussen.some(function(l) { return lusMatchEis(l) && !l.indoor_only; }) || loc.heeft_hightech || loc.heeft_indoor;
      }

      return true;
    });

  function sortLocaties(locs) {
    var effectiveSort = activeSortEis ? activeSortEis : (userLat ? 'afstand' : 'naam');
    if (activeSortLengte) effectiveSort = activeSortLengte;

    return locs.slice().sort(function(a, b) {
      if (effectiveSort === 'afstand') {
        var da = a.lat ? haversine(userLat, userLng, a.lat, a.lng) : 999999;
        var db = b.lat ? haversine(userLat, userLng, b.lat, b.lng) : 999999;
        return da - db;
      }
      if (effectiveSort === 'speeleisen_asc' || effectiveSort === 'speeleisen_desc') {
        var getMinEis = function(loc) {
          var ranks = loc.lussen.filter(function(l) { return !l.indoor_only; }).map(function(l) { return eisRank(l.speeleisen); });
          return ranks.length ? Math.min.apply(null, ranks) : 99;
        };
        var ai = getMinEis(a), bi = getMinEis(b);
        return effectiveSort === 'speeleisen_desc' ? bi - ai : ai - bi;
      }
      if (effectiveSort === 'lengte_asc' || effectiveSort === 'lengte_desc') {
        var al = Math.max.apply(null, a.lussen.map(function(l) { return l.lengte || 0; }));
        var bl = Math.max.apply(null, b.lussen.map(function(l) { return l.lengte || 0; }));
        return effectiveSort === 'lengte_asc' ? al - bl : bl - al;
      }
      return a.naam.localeCompare(b.naam, 'nl');
    });
  }

    var totalCards = totalLussen + (isEisOnly ? 0 : countHightech + countIndoor);
